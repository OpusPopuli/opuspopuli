name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packages-build:
    name: Build Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@opuspopuli'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build packages
        run: pnpm -r --filter './packages/*' build

      - name: Upload package build artifacts
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4
        with:
          name: packages-dist
          path: packages/*/dist/
          retention-days: 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@opuspopuli'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        with:
          sarif_file: 'trivy-fs-results.sarif'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@opuspopuli'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run linting
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [packages-build]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@opuspopuli'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download package build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: packages-dist
          path: packages/

      - name: Generate Prisma client
        run: pnpm --filter @opuspopuli/relationaldb-provider db:generate

      - name: Run tests with coverage
        run: pnpm test

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4
        with:
          name: coverage-reports
          path: |
            apps/frontend/coverage/
            apps/backend/coverage/
            packages/*/coverage/
          retention-days: 1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, packages-build]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@opuspopuli'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download package build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: packages-dist
          path: packages/

      - name: Generate Prisma client
        run: pnpm --filter @opuspopuli/relationaldb-provider db:generate

      - name: Build backend
        run: pnpm --filter backend build

      - name: Build frontend
        run: pnpm --filter frontend build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [packages-build, test]
    permissions:
      contents: read
      packages: read
      security-events: write
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@opuspopuli'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright browsers
        run: |
          # Full browser set on main, Chromium only on PRs
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            pnpm --filter frontend exec playwright install --with-deps
          else
            pnpm --filter frontend exec playwright install --with-deps chromium
          fi

      - name: Start backend services
        run: |
          echo "Starting E2E backend services..."
          docker compose -f docker-compose-e2e.yml up -d --build --wait --wait-timeout 600 \
            supabase-db redis inbucket db-migrate users documents knowledge region api
          echo "Service status:"
          docker compose -f docker-compose-e2e.yml ps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy container scan — users
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'opuspopuli-users:latest'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-users.sarif'

      - name: Trivy container scan — documents
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'opuspopuli-documents:latest'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-documents.sarif'

      - name: Trivy container scan — knowledge
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'opuspopuli-knowledge:latest'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-knowledge.sarif'

      - name: Trivy container scan — region
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'opuspopuli-region:latest'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-region.sarif'

      - name: Upload Trivy scan — users
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        if: ${{ always() && hashFiles('trivy-users.sarif') != '' }}
        with:
          sarif_file: 'trivy-users.sarif'
          category: 'container-scanning-users'

      - name: Upload Trivy scan — documents
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        if: ${{ always() && hashFiles('trivy-documents.sarif') != '' }}
        with:
          sarif_file: 'trivy-documents.sarif'
          category: 'container-scanning-documents'

      - name: Upload Trivy scan — knowledge
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        if: ${{ always() && hashFiles('trivy-knowledge.sarif') != '' }}
        with:
          sarif_file: 'trivy-knowledge.sarif'
          category: 'container-scanning-knowledge'

      - name: Upload Trivy scan — region
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        if: ${{ always() && hashFiles('trivy-region.sarif') != '' }}
        with:
          sarif_file: 'trivy-region.sarif'
          category: 'container-scanning-region'

      - name: Download package build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: packages-dist
          path: packages/

      - name: Generate Prisma client
        run: pnpm --filter @opuspopuli/relationaldb-provider db:generate

      - name: Run backend integration tests
        run: pnpm test:integration
        env:
          # API gateway runs on port 4000 in E2E docker-compose
          API_GATEWAY_URL: http://localhost:4000
          # Database connection for Prisma
          DATABASE_URL: postgresql://postgres:your-super-secret-password@localhost:5432/postgres

      - name: Build frontend
        run: pnpm --filter frontend build
        env:
          # API gateway runs on port 4000 in E2E docker-compose
          # Use /api to match local dev default and test route patterns
          NEXT_PUBLIC_GRAPHQL_URL: http://localhost:4000/api
          # Produce standalone output for E2E server (node server.js)
          NEXT_OUTPUT: standalone

      - name: Copy static assets for standalone build
        run: |
          # Next.js standalone requires static files to be copied manually
          # See: https://nextjs.org/docs/app/api-reference/config/next-config-js/output
          cp -r apps/frontend/.next/static apps/frontend/.next/standalone/apps/frontend/.next/static
          cp -r apps/frontend/public apps/frontend/.next/standalone/apps/frontend/public

      - name: Run E2E tests
        run: |
          # Full browser matrix on main, Chromium only on PRs
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            pnpm --filter frontend e2e
          else
            pnpm --filter frontend e2e --project=chromium
          fi

      - name: Show backend logs on failure
        if: failure()
        run: |
          echo "=== Docker Compose Service Status ==="
          docker compose -f docker-compose-e2e.yml ps

          echo ""
          echo "=== API Gateway Logs ==="
          docker compose -f docker-compose-e2e.yml logs api --tail=100

          echo ""
          echo "=== Users Service Logs ==="
          docker compose -f docker-compose-e2e.yml logs users --tail=50

          echo ""
          echo "=== Database Logs ==="
          docker compose -f docker-compose-e2e.yml logs supabase-db --tail=50

      - name: Stop backend services
        if: always()
        run: docker compose -f docker-compose-e2e.yml down -v

      - name: Upload Playwright report
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7
