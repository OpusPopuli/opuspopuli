# Docker Compose for UAT / Manual Validation
#
# Self-contained compose file that includes base infrastructure and defines
# all backend microservices for manual testing and validation.
#
# Includes LLM configuration for AI-powered features and disables automatic
# region sync so data ingestion can be triggered manually via GraphQL Playground.
#
# See: docs/guides/region-setup-and-validation-guide.md
#
# Usage:
#   # Start all services:
#   docker compose -f docker-compose-uat.yml up -d --build
#
#   # Start frontend (separate terminal):
#   cd apps/frontend && pnpm dev
#
#   # Stop services (keep data):
#   docker compose -f docker-compose-uat.yml down
#
#   # Stop services (delete data):
#   docker compose -f docker-compose-uat.yml down -v

include:
  - docker-compose.yml  # Base: Supabase, Redis, observability

x-backend-env: &backend-env
  NODE_ENV: test
  PROJECT: opuspopuli
  VERSION: 1.0.0
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
  OTEL_TRACING_ENABLED: "true"
  # ---- Credentials hydration ----------------------------------------------
  # UAT mirrors the opuspopuli-node prod pattern: secrets live in macOS
  # Keychain (managed by `create-op-node bootstrap --local-only --region
  # uat`) and are exported into the launchd session via the LaunchAgent.
  # Docker Desktop, launched by launchd, inherits them automatically.
  #
  # `${VAR:?msg}` form HARD-FAILS docker compose if the var is unset — we
  # deliberately removed the old `your-super-secret-password` fallback,
  # which silently downgraded to a known-weak credential when the
  # operator's shell predated the LaunchAgent load.
  #
  # If you see "variable is not set," run:
  #   create-op-node bootstrap --local-only --region uat
  # then reopen your terminal so `docker compose` inherits the new env.
  #
  # RESEND_API_KEY + SUPABASE_ANON_KEY + REDIS_URL are still sourced from
  # Supabase Vault at bootstrap (see issue #786) — SECRETS_PROVIDER=supabase
  # below activates that hydration step.
  # ------------------------------------------------------------------------
  RELATIONAL_DB_PROVIDER: postgres
  RELATIONAL_DB_HOST: opuspopuli-db
  RELATIONAL_DB_PORT: 5432
  RELATIONAL_DB_USERNAME: postgres
  RELATIONAL_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — run create-op-node bootstrap and reopen your shell}
  RELATIONAL_DB_DATABASE: postgres
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@opuspopuli-db:5432/postgres
  # SUPABASE_URL stays a literal — it's the in-network address for the
  # included docker-compose.yml's kong service. SUPABASE_SERVICE_ROLE_KEY
  # is required to reach Vault during bootstrap.
  SUPABASE_URL: http://supabase-kong:8000
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required — run create-op-node bootstrap}
  GATEWAY_CLIENT_ID: api-gateway
  # GATEWAY_HMAC_SECRET + API_KEYS are platform-internal HMAC keys, not yet
  # Keychain-managed (tracked in #811 — vault-first secrets refactor). Set
  # via shell env or .env when running UAT; the dev-grade defaults below
  # preserve the existing UAT workflow until #811 lands.
  GATEWAY_HMAC_SECRET: ${GATEWAY_HMAC_SECRET:-integration-test-hmac-secret}
  API_KEYS: ${API_KEYS:-'{"api-gateway":"integration-test-hmac-secret"}'}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — run create-op-node bootstrap}
  # AUTH_JWT_SECRET historically equals JWT_SECRET in dev/UAT — falls back
  # to JWT_SECRET when not set independently.
  AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-$JWT_SECRET}
  SECRETS_PROVIDER: supabase
  # SMTP_HOST default is inherited from docker-compose.yml (= inbucket).
  # To switch GoTrue to Resend SMTP for real magic-link delivery, set
  # SMTP_HOST=smtp.resend.com (and SMTP_PORT=465) at shell time before
  # `docker compose -f docker-compose-uat.yml up`. SMTP_USER/SMTP_PASS
  # come from Vault. Inbucket remains the default.
  SMTP_ADMIN_EMAIL: noreply@opuspopuli.local
  FRONTEND_URL: http://localhost:3300

services:
  db-migrate:
    build:
      context: .
      dockerfile: apps/backend/docker/Dockerfile.test-runner
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    container_name: opuspopuli-uat-db-migrate
    environment:
      <<: *backend-env
    depends_on:
      opuspopuli-db:
        condition: service_healthy
    command: ["/usr/local/bin/db-migrate.sh"]
    networks:
      - opuspopuli-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  users:
    build:
      context: .
      dockerfile: apps/backend/docker/Dockerfile.users
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    container_name: opuspopuli-uat-users
    environment:
      <<: *backend-env
      APPLICATION: users
      DESCRIPTION: Users microservice
      PORT: 8080
    ports:
      - "3001:8080"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - opuspopuli-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  documents:
    build:
      context: .
      dockerfile: apps/backend/docker/Dockerfile.documents
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    container_name: opuspopuli-uat-documents
    environment:
      <<: *backend-env
      APPLICATION: documents
      DESCRIPTION: Documents microservice
      PORT: 8080
    ports:
      - "3002:8080"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - opuspopuli-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  knowledge:
    build:
      context: .
      dockerfile: apps/backend/docker/Dockerfile.knowledge
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    container_name: opuspopuli-uat-knowledge
    environment:
      <<: *backend-env
      APPLICATION: knowledge
      DESCRIPTION: Knowledge microservice
      PORT: 8080
      # LLM for RAG queries during manual testing
      LLM_URL: http://host.docker.internal:11434
      LLM_MODEL: qwen3.5:9b
      # AI Prompt Service for proprietary prompt templates
      PROMPT_SERVICE_URL: http://opuspopuli-prompts:3210
      PROMPT_SERVICE_API_KEY: dev-key-1
    ports:
      - "3003:8080"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - opuspopuli-network
      - prompt-service_default
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  region:
    build:
      context: .
      dockerfile: apps/backend/docker/Dockerfile.region
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    container_name: opuspopuli-uat-region
    environment:
      <<: *backend-env
      APPLICATION: region
      DESCRIPTION: Region microservice
      PORT: 8080
      # LLM for AI-powered structural analysis during data scraping
      LLM_URL: http://host.docker.internal:11434
      LLM_MODEL: qwen3.5:9b
      # Bump default Ollama request timeout (60s) — proposition-analysis,
      # bio, and structural-analysis prompts are 7-18KB and routinely
      # take 60-150s on qwen3.5:9b on a Mac, especially after a sleep
      # cycle when the model has to reload into memory. 600s gives
      # headroom for the heaviest civics-extraction calls (legislative-
      # process page + ~150-term glossary), which can run 4-7 minutes
      # on a Mac. Bio and structural-analysis are unaffected — they
      # finish well under the prior 180s cap. See #646, #669.
      OLLAMA_REQUEST_TIMEOUT_MS: "600000"
      # AI Prompt Service for proprietary prompt templates
      PROMPT_SERVICE_URL: http://opuspopuli-prompts:3210
      # FEC_API_KEY (data.gov key) is sourced from Supabase Vault at bootstrap.
      # See docs/guides/secrets-management.md for seeding instructions.
      PROMPT_SERVICE_API_KEY: dev-key-1
      # Disable automatic sync scheduler — trigger manually via GraphQL Playground
      REGION_SYNC_ENABLED: "false"
      # Disable the legacy @Cron path — daily repeatable job is owned by region-worker
      REGION_SYNC_CRON_VIA_QUEUE: "true"
      # AI bio generation — dev-friendly defaults (prod uses 800 / 1 / unset)
      # CONCURRENCY>1 only helps when Ollama has OLLAMA_NUM_PARALLEL set to
      # match; otherwise Ollama serializes and extra queue depth causes timeouts.
      # MAX_REPS caps bio generation per run — useful in dev to verify pipeline
      # quickly. Leave unset in production so every rep gets a bio.
      BIO_GENERATOR_MAX_TOKENS: "1500"
      BIO_GENERATOR_CONCURRENCY: "1"
      BIO_GENERATOR_MAX_REPS: "5"
      # AI committee-assignment summary — short (~60 words) preamble above
      # the committee list. Same cap knob as bios for dev testing.
      COMMITTEE_SUMMARY_GENERATOR_MAX_TOKENS: "200"
      COMMITTEE_SUMMARY_GENERATOR_CONCURRENCY: "1"
      COMMITTEE_SUMMARY_GENERATOR_MAX_REPS: "5"
    ports:
      - "3004:8080"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - opuspopuli-network
      - prompt-service_default
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Bumped 2048M → 6144M for the campaign-finance bulk sync. The
          # federal plugin's fetchCampaignFinance accumulates all FEC
          # records (~3M) in memory before returning instead of honoring
          # the onBatch streaming flow — separate bug worth fixing, but
          # for now we just give the container enough headroom.
          cpus: '1.0'
          memory: 6144M
        reservations:
          cpus: '0.25'
          memory: 512M

  region-worker:
    build:
      context: .
      dockerfile: apps/backend/docker/Dockerfile.region-worker
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    container_name: opuspopuli-uat-region-worker
    environment:
      <<: *backend-env
      APPLICATION: region-worker
      DESCRIPTION: Region worker (async job processor)
      PORT: 8080
      REGION_WORKER_PORT: 8080
      LLM_URL: http://host.docker.internal:11434
      LLM_MODEL: qwen3.5:9b
      OLLAMA_REQUEST_TIMEOUT_MS: "600000"
      PROMPT_SERVICE_URL: http://opuspopuli-prompts:3210
      PROMPT_SERVICE_API_KEY: dev-key-1
      # No automatic scheduling in UAT — trigger via syncRegionData mutation
      REGION_SYNC_CRON_ENABLED: "false"
      REGION_SYNC_RUN_ON_STARTUP: "false"
      # 1-hour lock for region-sync — representatives bio generation takes ~70 min
      BULLMQ_QUEUE_REGION_SYNC_LOCK_DURATION_MS: "3600000"
      BIO_GENERATOR_MAX_TOKENS: "1500"
      BIO_GENERATOR_CONCURRENCY: "1"
      BIO_GENERATOR_MAX_REPS: "5"
      COMMITTEE_SUMMARY_GENERATOR_MAX_TOKENS: "200"
      COMMITTEE_SUMMARY_GENERATOR_CONCURRENCY: "1"
      COMMITTEE_SUMMARY_GENERATOR_MAX_REPS: "5"
    ports:
      - "3005:8080"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - opuspopuli-network
      - prompt-service_default
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 6144M
        reservations:
          cpus: '0.25'
          memory: 512M

  structural-analysis-worker:
    build:
      context: .
      dockerfile: apps/backend/docker/Dockerfile.structural-analysis-worker
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    container_name: opuspopuli-uat-structural-analysis-worker
    environment:
      <<: *backend-env
      APPLICATION: structural-analysis-worker
      DESCRIPTION: Structural analysis worker (async manifest analysis)
      PORT: 8080
      STRUCTURAL_ANALYSIS_WORKER_PORT: 8080
      # 10-min lock for structural analysis — LLM manifest analysis can be slow
      BULLMQ_QUEUE_PIPELINE_STRUCTURAL_ANALYSIS_LOCK_DURATION_MS: "600000"
      LLM_URL: http://host.docker.internal:11434
      LLM_MODEL: qwen3.5:9b
      OLLAMA_REQUEST_TIMEOUT_MS: "600000"
      PROMPT_SERVICE_URL: http://opuspopuli-prompts:3210
      PROMPT_SERVICE_API_KEY: dev-key-1
    ports:
      - "3006:8080"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - opuspopuli-network
      - prompt-service_default
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 4096M
        reservations:
          cpus: '0.25'
          memory: 512M

  llm-rerank-worker:
    build:
      context: .
      dockerfile: apps/backend/docker/Dockerfile.llm-rerank-worker
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    container_name: opuspopuli-uat-llm-rerank-worker
    environment:
      <<: *backend-env
      APPLICATION: llm-rerank-worker
      DESCRIPTION: LLM re-rank worker (personalized feed nightly batch, opuspopuli#745)
      PORT: 8080
      LLM_RERANK_WORKER_PORT: 8080
      LLM_URL: http://host.docker.internal:11434
      LLM_MODEL: qwen3.5:9b
      OLLAMA_REQUEST_TIMEOUT_MS: "600000"
      PROMPT_SERVICE_URL: http://opuspopuli-prompts:3210
      PROMPT_SERVICE_API_KEY: dev-key-1
      # Disable nightly cron in UAT — trigger via triggerMyLlmRerank mutation
      LLM_RERANK_CRON_ENABLED: "false"
      # Daily token budget per user. UAT keeps the prod default; raise
      # to validate near-cap behaviour without waiting a day.
      LLM_RERANK_PER_USER_DAILY_TOKEN_CAP: ${LLM_RERANK_PER_USER_DAILY_TOKEN_CAP:-10000}
      # Stale RUNNING-row sweep threshold on worker startup.
      LLM_RERANK_JOB_STALE_AGE_MS: ${LLM_RERANK_JOB_STALE_AGE_MS:-600000}
    ports:
      - "3007:8080"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - opuspopuli-network
      - prompt-service_default
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 4096M
        reservations:
          cpus: '0.25'
          memory: 512M

  api:
    build:
      context: .
      dockerfile: apps/backend/docker/Dockerfile.api
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-}
    container_name: opuspopuli-uat-api
    environment:
      <<: *backend-env
      APPLICATION: api
      DESCRIPTION: API Gateway
      PORT: 8080
      MICROSERVICES: '[{"name":"users","url":"http://users:8080/graphql"},{"name":"documents","url":"http://documents:8080/graphql"},{"name":"knowledge","url":"http://knowledge:8080/graphql"},{"name":"region","url":"http://region:8080/graphql"}]'
    ports:
      - "3000:8080"
    depends_on:
      users:
        condition: service_healthy
      documents:
        condition: service_healthy
      knowledge:
        condition: service_healthy
      region:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - opuspopuli-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  prompt-service_default:
    external: true
